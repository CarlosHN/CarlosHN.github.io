<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Research Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c1: #e8472a; --c2: #e8782a; --c3: #e8a82a; --c4: #7ab648;
    --c5: #2a9d8f; --c6: #3a86c8; --c7: #7b5ea7; --c8: #c94f7b;
    --bg: #1a1a2e; --surface: #16213e; --card: #0f3460;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(60,40,100,0.3) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(30,60,100,0.3) 0%, transparent 60%);
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 3vw, 2rem);
    text-align: center;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #f8d57e, #f8a87e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }

  .subtitle {
    font-size: 0.82rem;
    color: #8899bb;
    text-align: center;
    margin-bottom: 18px;
    letter-spacing: 0.5px;
  }

  .btns {
    display: flex; gap: 10px; margin-bottom: 20px;
  }

  button {
    padding: 8px 22px;
    border: none; border-radius: 30px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem; font-weight: 600;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
  #btn-new { background: linear-gradient(135deg, #f8d57e, #e87a2a); color: #1a1a2e; }
  #btn-scatter { background: rgba(255,255,255,0.1); color: #f0f0f0; border: 1px solid rgba(255,255,255,0.2); }

  .arena {
    display: flex;
    gap: 28px;
    align-items: flex-start;
    width: 100%;
    max-width: 760px;
  }

  /* TRAY */
  .tray {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 148px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 14px 10px;
  }

  .tray-label {
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #5566aa;
    text-align: center;
    margin-bottom: 4px;
  }

  /* BOARD */
  .board {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* SVG piece wrapper */
  .piece-wrap {
    position: relative;
    cursor: grab;
    transition: filter .2s, transform .2s;
    user-select: none;
    -webkit-user-drag: none;
  }
  .piece-wrap:active { cursor: grabbing; }
  .piece-wrap.dragging { opacity: 0.5; transform: scale(0.96); }

  /* SVG slot wrapper */
  .slot-wrap {
    position: relative;
    cursor: default;
  }
  .slot-wrap.over svg.ghost { filter: drop-shadow(0 0 8px rgba(255,255,255,0.5)); }

  svg.ghost { pointer-events: none; }
  svg.piece { display: block; }

  /* floating drag clone */
  #drag-clone {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%) scale(1.05);
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5));
    display: none;
  }

  /* confetti canvas */
  #confetti-canvas {
    position: fixed; top:0; left:0; width:100%; height:100%;
    pointer-events: none; z-index: 9998;
  }

  .progress {
    font-size: 0.8rem;
    color: #8899bb;
    text-align: center;
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  #win-msg {
    display: none;
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    background: linear-gradient(135deg, #f8d57e, #f8a87e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
    margin-bottom: 10px;
    animation: pop .4s cubic-bezier(.36,1.6,.6,1);
  }
  @keyframes pop { 0%{transform:scale(0.5);opacity:0} 100%{transform:scale(1);opacity:1} }
</style>
</head>
<body>

<h1>🧩 Research Framework Puzzle</h1>
<p class="subtitle">Drag each piece to its matching slot on the board</p>

<div class="btns">
  <button id="btn-new">✦ New Game</button>
  <button id="btn-scatter">⇄ Scatter</button>
</div>

<div id="win-msg">🎉 Puzzle Complete! Outstanding research!</div>

<p class="progress" id="progress">0 / 8 placed</p>

<div class="arena">
  <div class="tray" id="tray">
    <div class="tray-label">Pieces</div>
  </div>
  <div class="board" id="board"></div>
</div>

<svg id="drag-clone" width="148" height="60"></svg>
<canvas id="confetti-canvas"></canvas>

<script>
const LEVELS = [
  { id:1, label:"Background",                    color:"#e8472a" },
  { id:2, label:"Literature Review / Theoretical Framework", color:"#e8782a" },
  { id:3, label:"Problem Statement",             color:"#e8a82a" },
  { id:4, label:"Methodology",                   color:"#7ab648" },
  { id:5, label:"Work Plan",                     color:"#2a9d8f" },
  { id:6, label:"Design Proposal",               color:"#3a86c8" },
  { id:7, label:"Business Model Canvas",         color:"#7b5ea7" },
  { id:8, label:"Conclusion",                    color:"#c94f7b" },
];

const W = 148, H = 60, TAB = 12, NECK = 10;

// Generate random connector profile for 8 levels: array of 9 booleans (top of piece i)
// piece[0] top is always flat (background bottom of board = flat too)
let connectors = []; // connectors[i] = true means tab going UP on top edge of piece i+1 (blank on bottom of piece i)

function randomConnectors() {
  connectors = [];
  for (let i = 0; i < 7; i++) connectors.push(Math.random() > 0.5);
}

// Build SVG path for a puzzle piece (vertical rectangle with jigsaw top/bottom)
// topConn: null=flat, true=tab(protrudes up), false=blank(indents down)
// botConn: null=flat, true=tab(protrudes down), false=blank(indents up)
function piecePath(topConn, botConn) {
  const mx = W / 2;
  const t = 0, b = H;
  const n = NECK / 2;

  // Top edge
  let topEdge = "";
  if (topConn === null) {
    topEdge = `L ${W} ${t}`;
  } else if (topConn === true) {
    // tab protrudes upward
    topEdge = `L ${mx - n} ${t} C ${mx - n} ${t - TAB*0.3}, ${mx - TAB*0.7} ${t - TAB}, ${mx} ${t - TAB} C ${mx + TAB*0.7} ${t - TAB}, ${mx + n} ${t - TAB*0.3}, ${mx + n} ${t} L ${W} ${t}`;
  } else {
    // blank indents downward
    topEdge = `L ${mx - n} ${t} C ${mx - n} ${t + TAB*0.3}, ${mx - TAB*0.7} ${t + TAB}, ${mx} ${t + TAB} C ${mx + TAB*0.7} ${t + TAB}, ${mx + n} ${t + TAB*0.3}, ${mx + n} ${t} L ${W} ${t}`;
  }

  // Bottom edge (draw right to left)
  let botEdge = "";
  if (botConn === null) {
    botEdge = `L 0 ${b}`;
  } else if (botConn === true) {
    // tab protrudes downward
    botEdge = `L ${mx + n} ${b} C ${mx + n} ${b + TAB*0.3}, ${mx + TAB*0.7} ${b + TAB}, ${mx} ${b + TAB} C ${mx - TAB*0.7} ${b + TAB}, ${mx - n} ${b + TAB*0.3}, ${mx - n} ${b} L 0 ${b}`;
  } else {
    // blank indents upward
    botEdge = `L ${mx + n} ${b} C ${mx + n} ${b - TAB*0.3}, ${mx + TAB*0.7} ${b - TAB}, ${mx} ${b - TAB} C ${mx - TAB*0.7} ${b - TAB}, ${mx - n} ${b - TAB*0.3}, ${mx - n} ${b} L 0 ${b}`;
  }

  return `M 0 ${t} ${topEdge} L ${W} ${b} ${botEdge} Z`;
}

function getTopConn(idx) {
  if (idx === 0) return null;
  const c = connectors[idx - 1];
  return c ? false : true; // if connector[i-1]=true means bottom of prev is tab, so top of this is blank
}

function getBotConn(idx) {
  if (idx === 7) return null;
  const c = connectors[idx];
  return c ? true : false;
}

// Extra SVG height needed for tabs
function svgHeight(topConn, botConn) {
  let extra = 0;
  if (topConn === true) extra += TAB;
  if (botConn === true) extra += TAB;
  return H + extra;
}

function svgOffsetY(topConn) {
  return topConn === true ? TAB : 0;
}

// Build piece SVG element
function buildPieceSVG(levelIdx, ghost = false) {
  const lv = LEVELS[levelIdx];
  const topConn = getTopConn(levelIdx);
  const botConn = getBotConn(levelIdx);
  const extraTop = (topConn === true) ? TAB : 0;
  const extraBot = (botConn === true) ? TAB : 0;
  const totalH = H + extraTop + extraBot;

  const ns = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(ns, "svg");
  svg.setAttribute("width", W);
  svg.setAttribute("height", totalH);
  svg.setAttribute("viewBox", `0 0 ${W} ${totalH}`);
  svg.classList.add(ghost ? "ghost" : "piece");

  // translate path so top of piece body sits at y=extraTop
  const g = document.createElementNS(ns, "g");
  g.setAttribute("transform", `translate(0, ${extraTop})`);

  const path = document.createElementNS(ns, "path");
  path.setAttribute("d", piecePath(topConn, botConn));

  if (ghost) {
    path.setAttribute("fill", "rgba(255,255,255,0.07)");
    path.setAttribute("stroke", "rgba(255,255,255,0.25)");
    path.setAttribute("stroke-width", "1.5");
    path.setAttribute("stroke-dasharray", "6 4");
  } else {
    const gradId = `grad-${lv.id}`;
    const defs = document.createElementNS(ns, "defs");
    const grad = document.createElementNS(ns, "linearGradient");
    grad.setAttribute("id", gradId);
    grad.setAttribute("x1","0%"); grad.setAttribute("y1","0%");
    grad.setAttribute("x2","100%"); grad.setAttribute("y2","100%");
    const s1 = document.createElementNS(ns, "stop");
    s1.setAttribute("offset","0%");
    s1.setAttribute("stop-color", lighten(lv.color, 20));
    const s2 = document.createElementNS(ns, "stop");
    s2.setAttribute("offset","100%");
    s2.setAttribute("stop-color", darken(lv.color, 20));
    grad.appendChild(s1); grad.appendChild(s2);
    defs.appendChild(grad);
    svg.appendChild(defs);

    path.setAttribute("fill", `url(#${gradId})`);
    path.setAttribute("stroke", "rgba(255,255,255,0.3)");
    path.setAttribute("stroke-width", "1.2");

    // Number badge
    const circle = document.createElementNS(ns, "circle");
    circle.setAttribute("cx", "18"); circle.setAttribute("cy", H/2);
    circle.setAttribute("r", "11");
    circle.setAttribute("fill", "rgba(0,0,0,0.25)");

    const num = document.createElementNS(ns, "text");
    num.setAttribute("x","18"); num.setAttribute("y", H/2 + 4.5);
    num.setAttribute("text-anchor","middle");
    num.setAttribute("fill","white");
    num.setAttribute("font-size","12");
    num.setAttribute("font-weight","700");
    num.setAttribute("font-family","DM Sans, sans-serif");
    num.textContent = lv.id;

    // Label
    const label = document.createElementNS(ns, "text");
    const maxChars = 22;
    const displayLabel = lv.label.length > maxChars ? lv.label.substring(0, maxChars) + "…" : lv.label;
    label.setAttribute("x","35"); label.setAttribute("y", H/2 - 4);
    label.setAttribute("fill","rgba(255,255,255,0.95)");
    label.setAttribute("font-size","9.5");
    label.setAttribute("font-weight","600");
    label.setAttribute("font-family","DM Sans, sans-serif");
    label.textContent = displayLabel;

    // Sub-level hint
    const sub = document.createElementNS(ns, "text");
    sub.setAttribute("x","35"); sub.setAttribute("y", H/2 + 9);
    sub.setAttribute("fill","rgba(255,255,255,0.5)");
    sub.setAttribute("font-size","8");
    sub.setAttribute("font-family","DM Sans, sans-serif");
    sub.textContent = `Level ${lv.id}`;

    g.appendChild(circle); g.appendChild(num);
    g.appendChild(label); g.appendChild(sub);
  }

  g.insertBefore(path, g.firstChild);
  svg.appendChild(g);
  return svg;
}

function lighten(hex, pct) { return shiftColor(hex, pct); }
function darken(hex, pct) { return shiftColor(hex, -pct); }
function shiftColor(hex, pct) {
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, Math.max(0, r + pct*2));
  g = Math.min(255, Math.max(0, g + pct*2));
  b = Math.min(255, Math.max(0, b + pct*2));
  return `rgb(${r},${g},${b})`;
}

// State
let placed = new Array(8).fill(false);
let trayOrder = [];

function render() {
  const board = document.getElementById("board");
  const tray = document.getElementById("tray");
  board.innerHTML = '';
  tray.innerHTML = '<div class="tray-label">Pieces</div>';

  // Board slots
  for (let i = 0; i < 8; i++) {
    const slot = document.createElement("div");
    slot.classList.add("slot-wrap");
    slot.dataset.slot = i;

    if (placed[i]) {
      // Show placed piece
      const svg = buildPieceSVG(i, false);
      svg.style.display = "block";
      slot.appendChild(svg);
    } else {
      // Show ghost
      const ghost = buildPieceSVG(i, true);
      slot.appendChild(ghost);
      // drop target
      slot.addEventListener("dragover", onDragOver);
      slot.addEventListener("dragleave", onDragLeave);
      slot.addEventListener("drop", onDrop);
      // touch
      slot.addEventListener("touchmove", onTouchMove, {passive:false});
      slot.addEventListener("touchend", onTouchEnd);
    }
    board.appendChild(slot);
  }

  // Tray pieces (unplaced, shuffled)
  trayOrder.forEach(i => {
    if (!placed[i]) {
      const wrap = document.createElement("div");
      wrap.classList.add("piece-wrap");
      wrap.dataset.piece = i;
      wrap.draggable = true;

      const svg = buildPieceSVG(i, false);
      wrap.appendChild(svg);

      wrap.addEventListener("dragstart", onDragStart);
      wrap.addEventListener("dragend", onDragEnd);
      wrap.addEventListener("touchstart", onTouchStart, {passive:false});

      tray.appendChild(wrap);
    }
  });

  updateProgress();
}

let dragPieceIdx = -1;
let dragClone = document.getElementById("drag-clone");

function onDragStart(e) {
  dragPieceIdx = parseInt(e.currentTarget.dataset.piece);
  e.currentTarget.classList.add("dragging");
  e.dataTransfer.effectAllowed = "move";
  e.dataTransfer.setData("text/plain", dragPieceIdx);
  // transparent drag image
  const blank = document.createElement("canvas");
  blank.width = blank.height = 1;
  e.dataTransfer.setDragImage(blank, 0, 0);
  showClone(dragPieceIdx, e.clientX, e.clientY);
}

function onDragEnd(e) {
  e.currentTarget.classList.remove("dragging");
  dragClone.style.display = "none";
  dragPieceIdx = -1;
}

document.addEventListener("dragover", (e) => {
  e.preventDefault();
  if (dragPieceIdx >= 0) moveClone(e.clientX, e.clientY);
});

function onDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add("over");
}

function onDragLeave(e) {
  e.currentTarget.classList.remove("over");
}

function onDrop(e) {
  e.preventDefault();
  const slotIdx = parseInt(e.currentTarget.dataset.slot);
  const pieceIdx = dragPieceIdx >= 0 ? dragPieceIdx : parseInt(e.dataTransfer.getData("text/plain"));
  e.currentTarget.classList.remove("over");
  tryPlace(pieceIdx, slotIdx);
}

// Touch drag
let touchPiece = -1;
let touchCloneActive = false;

function onTouchStart(e) {
  touchPiece = parseInt(e.currentTarget.dataset.piece);
  const t = e.touches[0];
  showClone(touchPiece, t.clientX, t.clientY);
  touchCloneActive = true;
  e.preventDefault();
}

function onTouchMove(e) {
  if (touchCloneActive) {
    const t = e.touches[0];
    moveClone(t.clientX, t.clientY);
  }
  e.preventDefault();
}

function onTouchEnd(e) {
  if (!touchCloneActive) return;
  dragClone.style.display = "none";
  touchCloneActive = false;

  const t = e.changedTouches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const slot = el ? el.closest(".slot-wrap") : null;
  if (slot) {
    const slotIdx = parseInt(slot.dataset.slot);
    tryPlace(touchPiece, slotIdx);
  }
  touchPiece = -1;
}

function showClone(idx, x, y) {
  const lv = LEVELS[idx];
  dragClone.style.display = "block";
  dragClone.setAttribute("width", W);
  dragClone.setAttribute("height", H + TAB*2);
  dragClone.innerHTML = "";
  const tmpSvg = buildPieceSVG(idx, false);
  // Copy children
  Array.from(tmpSvg.childNodes).forEach(n => dragClone.appendChild(n.cloneNode(true)));
  moveClone(x, y);
}

function moveClone(x, y) {
  dragClone.style.left = x + "px";
  dragClone.style.top = y + "px";
}

function tryPlace(pieceIdx, slotIdx) {
  if (pieceIdx === slotIdx) {
    placed[slotIdx] = true;
    trayOrder = trayOrder.filter(i => i !== pieceIdx);
    render();
    checkWin();
  } else {
    // Wrong piece - shake effect
    const slot = document.querySelector(`.slot-wrap[data-slot="${slotIdx}"]`);
    if (slot) {
      slot.style.animation = "none";
      slot.offsetHeight;
      slot.style.animation = "shake .3s";
    }
  }
}

// Add shake keyframe
const styleEl = document.createElement("style");
styleEl.textContent = `@keyframes shake {0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}}`;
document.head.appendChild(styleEl);

function updateProgress() {
  const count = placed.filter(Boolean).length;
  document.getElementById("progress").textContent = `${count} / 8 placed`;
}

function checkWin() {
  if (placed.every(Boolean)) {
    document.getElementById("win-msg").style.display = "block";
    launchConfetti();
  }
}

function newGame() {
  randomConnectors();
  placed = new Array(8).fill(false);
  trayOrder = [...Array(8).keys()];
  shuffle(trayOrder);
  document.getElementById("win-msg").style.display = "none";
  render();
}

function scatter() {
  shuffle(trayOrder);
  render();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ---- Confetti ----
const canvas = document.getElementById("confetti-canvas");
const ctx = canvas.getContext("2d");
let particles = [];

function launchConfetti() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  particles = [];
  const colors = ["#e8472a","#e8a82a","#7ab648","#2a9d8f","#3a86c8","#7b5ea7","#c94f7b","#f8d57e"];
  for (let i = 0; i < 180; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: -10,
      r: Math.random() * 7 + 3,
      d: Math.random() * 8 + 2,
      color: colors[Math.floor(Math.random()*colors.length)],
      tilt: Math.random() * 20 - 10,
      tiltAngle: 0,
      tiltAngleInc: Math.random() * 0.07 + 0.05
    });
  }
  animateConfetti();
}

function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  let alive = false;
  particles.forEach(p => {
    p.tiltAngle += p.tiltAngleInc;
    p.y += p.d;
    p.tilt = Math.sin(p.tiltAngle) * 12;
    if (p.y < canvas.height + 20) alive = true;
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, p.r * 0.6, p.r, p.tiltAngle, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();
  });
  if (alive) requestAnimationFrame(animateConfetti);
  else ctx.clearRect(0, 0, canvas.width, canvas.height);
}

document.getElementById("btn-new").addEventListener("click", newGame);
document.getElementById("btn-scatter").addEventListener("click", scatter);

newGame();
</script>
</body>
</html>
